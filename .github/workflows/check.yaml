name: Check
on: push
jobs:
  lint:
    runs-on: [self-hosted, Linux, X64, vps]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
  test:
    needs: [lint]
    runs-on: [self-hosted, Linux, X64, vps]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install deps
        run: npm ci
      - name: Test
        run: npm run test
