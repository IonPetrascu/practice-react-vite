name: Check
on: push

jobs:
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Prepare & install
        run: |
          rm -rf node_modules package-lock.json   # ← чистим, чтобы установка была свежей
          npm install                             # ← вместо npm ci

      - name: Lint
        run: npm run lint

  test:
    needs: [lint]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Prepare & install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Test
        run: npm run test
