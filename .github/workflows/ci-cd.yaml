name: CI/CD
on:
  push:
    branches:
      - dev
      - master

jobs:
  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Test
        run: npm run test

  deploy:
    needs: test
    runs-on: [self-hosted, Linux, X64]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t frontend .
      - name: Deploy
        run: |
          docker stop frontend || true
          docker rm frontend || true
          docker run -d --name frontend -p 80:80 frontend
